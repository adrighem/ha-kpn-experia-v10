<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00a300;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007a00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle (Home Assistant Green-ish) -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  
  <!-- Router Body -->
  <rect x="106" y="280" width="300" height="120" rx="20" fill="#ffffff" />
  <rect x="106" y="360" width="300" height="40" rx="10" fill="#f0f0f0" />
  
  <!-- Router Antennas/Signal (Representing Features/Connectivity) -->
  <path d="M160 280 L160 180 Q160 160 180 160" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" />
  <path d="M352 280 L352 180 Q352 160 332 160" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" />
  
  <!-- "v10" Text -->
  <text x="256" y="345" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#00a300" text-anchor="middle">v10</text>
  
  <!-- Feature Symbols (Connectivity Dots) -->
  <circle cx="140" cy="320" r="10" fill="#00a300" />
  <circle cx="180" cy="320" r="10" fill="#00a300" />
  <circle cx="220" cy="320" r="10" fill="#00a300" opacity="0.3" />
  
  <!-- Data Flow Arrows (Representing WAN Stats) -->
  <path d="M430 220 L430 140 M415 160 L430 140 L445 160" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M82 140 L82 220 M67 200 L82 220 L97 200" stroke="#ffffff" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Network Nodes (Representing Device Tracking) -->
  <circle cx="256" cy="120" r="15" fill="#ffffff" />
  <line x1="256" y1="120" x2="190" y2="160" stroke="#ffffff" stroke-width="4" />
  <line x1="256" y1="120" x2="322" y2="160" stroke="#ffffff" stroke-width="4" />
</svg>
